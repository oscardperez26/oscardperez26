name: Generate Snake

on:
  # Ejecuta el workflow cada 6 horas
  schedule:
    - cron: "0 */6 * * *"
  # Permite ejecutarlo manualmente desde la pestaña "Actions"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Verifica el código del repositorio
      - uses: actions/checkout@v2

      # Genera la serpiente
      - uses: Platane/snk@master
        id: snake-gif
        with:
          github_user_name: tu‑nombre‑de‑usuario
          # Genera los archivos en la rama `output` para no ensuciar la rama principal
          gif_out_path: dist/github-contribution-grid-snake.gif
          svg_out_path: dist/github-contribution-grid-snake.svg

      # Publica los archivos en la rama `output`
      - uses: crazy-max/ghaction-github-pages@v2.1.3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
